version: '3'

silent: true

tasks:
  default:
    desc: "Run unit tests (alias for 'test')"
    cmds:
      - task: test

  test:
    desc: "Run unit tests"
    cmds:
      - go test ./...

  test:race:
    desc: "Run unit tests with -race"
    cmds:
      - go test -race ./...

  fmt:
    desc: "Format Go source files in place"
    cmds:
      - gofmt -w .

  fmt:check:
    desc: "Fail if any Go file is not gofmt'd"
    cmds:
      - |
        out=$(gofmt -l .)
        if [ -n "$out" ]; then
          echo "gofmt diffs:"
          echo "$out"
          exit 1
        fi

  vet:
    desc: "Run go vet across all packages"
    cmds:
      - go vet ./...

  build:examples:
    desc: "Compile every example program to catch API drift"
    cmds:
      - go build ./examples/...

  lint:
    desc: "Run staticcheck via 'go run' (no global install required)"
    cmds:
      - go run honnef.co/go/tools/cmd/staticcheck@latest ./...

  tidy:
    desc: "Run go mod tidy"
    cmds:
      - go mod tidy

  release:check:
    desc: "Verify GIT_TAG env var matches the Version constant in client.go (e.g. GIT_TAG=v0.1.0 task release:check)"
    cmds:
      - |
        tag="${GIT_TAG:-}"
        if [ -z "$tag" ]; then
          echo "GIT_TAG env var is required (e.g. GIT_TAG=v0.1.0 task release:check)"
          exit 1
        fi
        expected="${tag#v}"
        actual=$(grep -E '^const Version' client.go | sed -E 's/.*"([^"]+)".*/\1/')
        if [ "$expected" != "$actual" ]; then
          echo "Tag $tag implies Version=$expected, but client.go has Version=\"$actual\""
          exit 1
        fi
        echo "OK: tag $tag matches Version=\"$actual\""

  ci:
    desc: "Run the full CI pipeline locally (fmt:check, vet, build:examples, test:race, lint)"
    cmds:
      - task: fmt:check
      - task: vet
      - task: build:examples
      - task: test:race
      - task: lint
